name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_PASSWORD_RECOVERY_MODE: link
      VITE_API_BASE_URL: https://dessert-ai-backend-production.up.railway.app
      VITE_SUPABASE_URL: https://uqniavennyrfdyakmxan.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbmlhdmVubnlyZmR5YWtteGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjExMDksImV4cCI6MjA4OTQ5NzEwOX0.on-Kxg62tR-7tFiPSsRu7vWoqm3Nv0OGjGQlWZtURuE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Warn about missing frontend environment
        run: |
          if [ -z "$VITE_API_BASE_URL" ] || [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Missing frontend secrets. The site can still deploy, but API and Supabase features will not work until VITE_API_BASE_URL, VITE_SUPABASE_URL, and VITE_SUPABASE_ANON_KEY are set in GitHub repository secrets."
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Compute GitHub Pages base path
        id: pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"

          if [ "$REPO_NAME" = "${OWNER_NAME}.github.io" ]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER_NAME}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER_NAME}.github.io/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Show expected GitHub Pages URL
        run: echo "Expected deploy URL -> ${{ steps.pages.outputs.site_url }}"

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --base "${{ steps.pages.outputs.base_path }}"

      - name: Add SPA fallback
        working-directory: frontend/dist
        run: cp index.html 404.html

      - name: Disable Jekyll processing
        working-directory: frontend/dist
        run: touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
